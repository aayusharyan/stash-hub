# =============================================================================
# @file release.yml
# @description Automated release workflow with Docker image publishing to GHCR.
#
# Triggered manually from the Actions tab. Calculates the next semver from the
# latest git tag, bumps the version in package.json and docker/Dockerfile,
# commits & tags, builds a multi-platform Docker image, pushes to GHCR, and
# creates a GitHub Release with auto-generated changelog.
#
# Usage: Actions tab → Create Release → Run workflow → Select version bump type
#
# Flow:
# Calculate version → Update files → Commit → Tag → Build Docker → Release
# =============================================================================

name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - minor
          - major
        default: minor

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # for commits, tags, and releases
      packages: write   # for pushing Docker images to GHCR

    steps:
      # Fetch full history so tag detection and changelog generation work correctly
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Reads the latest vX.Y.Z tag and bumps major or minor, resetting lower components
      - name: Calculate new version
        id: version
        run: |
          LATEST_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n 1)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ "${{ github.event.inputs.version_bump }}" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          else
            MINOR=$((MINOR + 1))
            PATCH=0
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT

      # Bumps version in package.json (using jq) and LABEL in docker/Dockerfile (using sed)
      - name: Update version in codebase
        run: |
          jq '.version = "${{ steps.version.outputs.version_number }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

          sed -i 's/LABEL version=".*"/LABEL version="${{ steps.version.outputs.version_number }}"/' docker/Dockerfile

          echo "Updated version in package.json:"
          grep '"version"' package.json
          echo ""
          echo "Updated version in docker/Dockerfile:"
          grep 'LABEL version=' docker/Dockerfile

      # Skips commit gracefully if files were already at the target version (no-op update)
      - name: Commit and push version bump
        run: |
          git config user.name "Aayush Sinha"
          git config user.email "hello@yush.dev"
          git add package.json docker/Dockerfile
          if git diff --cached --quiet; then
            echo "Files already at version ${{ steps.version.outputs.version_number }}, skipping commit"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.version_number }}"
            git push origin main
          fi

      - name: Create and push tag
        run: |
          git config user.name "Aayush Sinha"
          git config user.email "hello@yush.dev"
          git tag -a ${{ steps.version.outputs.new_version }} -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin ${{ steps.version.outputs.new_version }}

      # Collects all commits since the previous tag for the release notes body
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n 2 | head -n 1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ steps.version.outputs.new_version }}" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log ${PREV_TAG}..${{ steps.version.outputs.new_version }} --pretty=format:"- %s (%h)" --no-merges)
          fi

          cat > RELEASE_NOTES.md << EOF
          ## What's Changed

          ${COMMITS}

          ## Docker

          \`\`\`bash
          docker compose -f docker/docker-compose.yml up -d
          \`\`\`

          Or pull the image directly:

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.new_version }}
          \`\`\`

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.new_version }}
          EOF

          echo "Release notes generated"

      # Sets up QEMU and Buildx for multi-platform image builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates Docker tags: latest, vX.Y.Z, vX.Y, vX
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.new_version }}
            type=raw,value=v${{ steps.version.outputs.major_minor }}
            type=raw,value=v${{ steps.version.outputs.major }}

      # Builds and pushes the Docker image to GHCR for both amd64 and arm64
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Default NEXT_PUBLIC_* values baked into the released image
          build-args: |
            NEXT_PUBLIC_STASH_EXTERNAL_URL=http://localhost:9999
            NEXT_PUBLIC_PAGE_SIZE=60
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
